name: CI smoke

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # test:ci ejecuta scripts bajo backend/ que hacen require de servicios; con DB_MODE=postgres hace falta `pg` en node_modules.
      - name: npm ci (backend)
        run: npm ci --prefix backend
      - name: Cadena test:ci (plan release 1.0.0 §2 + regresión)
        run: npm run test:ci
