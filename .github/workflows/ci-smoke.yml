name: CI smoke

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Raíz: dependencias de `package.json` (scripts test:ci vía `npm run`). Backend: `pg`, Express, servicios bajo `backend/`.
      # Backend: solo dependencias de producción. `firebase-tools` y `tailwindcss` (dev) no participan en `test:ci` y su árbol ha provocado `npm ci` fallando al instante en ubuntu-latest.
      - name: npm ci (raíz)
        run: npm ci
      - name: npm ci (backend, prod)
        working-directory: backend
        run: npm ci --omit=dev
      - name: Cadena test:ci (plan release 1.0.0 §2 + regresión)
        run: npm run test:ci
