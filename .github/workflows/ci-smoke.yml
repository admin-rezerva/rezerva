name: CI smoke

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Raíz: dependencias de `package.json` (scripts test:ci vía `npm run`). Backend: `pg`, Express, servicios bajo `backend/`.
      # Backend: solo prod (`firebase-tools` / tailwind no hacen falta en smoke). `npm ci --omit=dev` falla en caliente en algunos runners; `npm install --omit=dev` respeta `package-lock.json`.
      - name: npm ci (raíz)
        run: npm ci
      - name: npm install (backend, prod)
        working-directory: backend
        run: npm install --omit=dev --no-audit --no-fund
      - name: Cadena test:ci (plan release 1.0.0 §2 + regresión)
        run: npm run test:ci
